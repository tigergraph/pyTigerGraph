{% set python_min = "3.9" %}

package:
  name: pytigergraph
  version: "2.0.1"

source:
  url: https://pypi.org/packages/source/p/pytigergraph/pytigergraph-2.0.1.tar.gz
  sha256: 6c0834a7abdacf4b00c41e3603c397954a50825677ddadde7a03086eaae479f4

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - wheel
  run:
    - python >={{ python_min }}
    - requests
    - aiohttp
    - httpx
    - validators

test:
  imports:
    - pyTigerGraph
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/tigergraph/pyTigerGraph
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Python client for TigerGraph

extra:
  recipe-maintainers:
    - chengbiao-jin
